<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <title>日本語学習ノート — ITエンジニア向け</title>
  <meta name="description" content="ITエンジニアのための日本語学習ノート。N2/N3レベルの技術語彙・文法・読解問題を毎日自動生成。">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🇯🇵</text></svg>">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --theme-color: #3949ab;
    }

    body {
      font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', Meiryo, sans-serif;
    }

    /* ── Cover page ── */
    section.cover {
      background: linear-gradient(145deg, #0d1b2a 0%, #1a237e 50%, #283593 100%) !important;
    }
    section.cover h1 {
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: #fff !important;
    }
    section.cover blockquote {
      color: rgba(255,255,255,0.85);
      border: none;
      background: rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 12px 20px;
    }
    section.cover ul {
      list-style: none;
      padding: 0;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }
    section.cover ul li {
      background: rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 6px 16px;
      color: #fff;
      font-size: 0.9rem;
    }
    section.cover .cover-main > p:last-child a {
      background: #fff;
      color: #1a237e;
      border-radius: 30px;
      padding: 10px 28px;
      font-weight: 700;
      text-decoration: none;
      transition: all 0.2s;
    }
    section.cover .cover-main > p:last-child a:last-child {
      background: transparent;
      border: 2px solid rgba(255,255,255,0.6);
      color: #fff;
      margin-left: 12px;
    }
    section.cover .cover-main > p:last-child a:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    /* ── Sidebar ── */
    .sidebar {
      padding-top: 12px;
    }
    .sidebar > h1 {
      font-size: 1.1rem !important;
      font-weight: 700;
      color: #1a237e;
      padding: 16px 20px 8px;
    }
    .sidebar-nav > ul > li > a {
      font-weight: 700;
      font-size: 0.85rem;
      color: #455a64;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .sidebar-nav li.active > a {
      color: var(--theme-color);
    }
    .sidebar-nav p {
      font-size: 0.72rem;
      font-weight: 700;
      color: #90a4ae;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 16px 20px 4px;
      margin: 0;
    }

    /* ── Content ── */
    .markdown-section {
      max-width: 860px;
    }
    .markdown-section h1 {
      border-bottom: 3px solid #e8eaf6;
      padding-bottom: 12px;
      color: #1a237e;
    }
    .markdown-section h2 {
      color: #283593;
      border-left: 4px solid #3949ab;
      padding-left: 12px;
    }
    .markdown-section h3 {
      color: #3949ab;
    }
    .markdown-section table {
      display: block;
      overflow-x: auto;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }
    .markdown-section table th {
      background: #e8eaf6;
      color: #1a237e;
      font-weight: 700;
    }
    .markdown-section table tr:nth-child(even) {
      background: #f5f5f5;
    }
    .markdown-section blockquote {
      border-left: 4px solid #3949ab;
      background: #f3f4fd;
      border-radius: 0 8px 8px 0;
    }
    .markdown-section code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.875em;
      background: #f0f1ff;
      color: #3949ab;
      border-radius: 4px;
      padding: 2px 6px;
    }
    .markdown-section pre code {
      background: transparent;
      color: inherit;
      padding: 0;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      section.cover h1 { font-size: 2rem; }
    }
  </style>
</head>
<body>
  <div id="app">読み込み中...</div>
  <script>
    window.$docsify = {
      name: '🇯🇵 日本語学習',
      nameLink: '/',
      repo: 'https://github.com/falco2202/nihongo',
      loadSidebar: true,
      coverpage: true,
      onlyCover: false,
      auto2top: true,
      maxLevel: 3,
      subMaxLevel: 2,
      routerMode: 'hash',
      themeColor: '#3949ab',
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '🔍 検索...',
        noData: '見つかりませんでした',
        depth: 4,
      },
      pagination: {
        previousText: '← 前のページ',
        nextText: '次のページ →',
        crossChapter: true,
      },
      copyCode: {
        buttonText: 'コピー',
        errorText: 'エラー',
        successText: '✓',
      },
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-javascript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
</body>
</html>
